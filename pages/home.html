<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - SkillSwap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --yellow: #F2BD19;
            --yellow-dark: #d4a614;
            --black: #1A1A1A;
            --white: #FAFAFA;
            --grey: #6b6b6b;
            --font-heading: 'Darker Grotesque', sans-serif;
            --font-body: 'Inter', sans-serif;
            --radius-btn: 50px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: var(--font-body);
            background: #e9e9e9;
            color: var(--black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        /* ========================
           NAVBAR
        ======================== */
        .navbar {
            background: var(--white);
            border-bottom: 1px solid #ddd;
            padding: 0.85rem 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-logo {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            flex-shrink: 0;
        }

        .logo-box {
            background: var(--black);
            border-radius: 8px;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-box svg {
            width: 22px;
            height: 22px;
        }

        .logo-name {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--black);
            letter-spacing: -0.02em;
        }

        .nav-center {
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        .nav-center a {
            font-family: var(--font-body);
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--grey);
            padding: 0.45rem 0.9rem;
            border-radius: var(--radius-btn);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .nav-center a:hover {
            color: var(--black);
            background: #f0f0f0;
        }

        .nav-center a.active {
            background: var(--yellow);
            color: var(--black);
            font-weight: 600;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-shrink: 0;
        }

        .nav-search-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--grey);
            display: flex;
            align-items: center;
            padding: 0.3rem;
            transition: color 0.2s;
        }

        .nav-search-btn:hover {
            color: var(--black);
        }

        .nav-search-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Dropdown */
        .nav-dropdown {
            position: relative;
        }

        .nav-menu-btn {
            width: 40px;
            height: 40px;
            background: var(--black);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 1rem;
            transition: background 0.2s;
        }

        .nav-menu-btn:hover {
            background: #333;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: calc(100% + 0.5rem);
            right: 0;
            background: var(--white);
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            min-width: 170px;
            overflow: hidden;
            z-index: 200;
        }

        .dropdown-menu.open {
            display: block;
        }

        .dropdown-menu a {
            display: block;
            padding: 0.75rem 1.2rem;
            font-size: 0.88rem;
            color: var(--black);
            font-weight: 500;
            transition: background 0.15s;
        }

        .dropdown-menu a:hover {
            background: #f5f5f5;
        }

        .dropdown-menu .logout {
            color: #dc2626;
            border-top: 1px solid #f0f0f0;
        }

        .dropdown-menu .logout:hover {
            background: #fef2f2;
        }

        /* ========================
           MAIN
        ======================== */
        .main-content {
            flex: 1;
            display: flex;
            align-items: stretch;
            justify-content: center;
            padding: 0;
        }

        /* ========================
           GOLDEN CARD
        ======================== */
        .golden-card {
            position: relative;
            width: 100%;
            max-width: 100%;
            height: 100%;
            border-radius: 28px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem 3.5rem;
            background-image: url('/images/golden-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }


        /* ── DOODLE ICONS ── */
        .doodles {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        .doodle {
            position: absolute;
            opacity: 0.2;
            stroke: #5a3a00;
            fill: none;
            stroke-width: 1.4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ── CARD CONTENT ── */
        .card-content {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 880px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top button */
        .card-top-btn {
            background: var(--white);
            color: var(--black);
            font-family: var(--font-heading);
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.65rem 2.8rem;
            border-radius: var(--radius-btn);
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 14px rgba(0, 0, 0, 0.18);
            transition: all 0.2s;
            display: inline-block;
            margin-bottom: 1.4rem;
        }

        .card-top-btn:hover {
            background: var(--black);
            color: var(--white);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        }

        /* Subtitle */
        .card-subtitle {
            font-family: var(--font-heading);
            font-size: clamp(1rem, 2vw, 1.4rem);
            font-weight: 500;
            color: rgba(60, 38, 0, 0.7);
            letter-spacing: 0.01em;
            margin-bottom: 0.1rem;
            text-align: center;
        }

        /* SKILL-SWAP embossed */
        .card-brand {
            font-family: var(--font-heading);
            font-size: clamp(3rem, 9vw, 8.5rem);
            font-weight: 900;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            text-align: center;
            line-height: 1;
            margin-bottom: 1.8rem;
            user-select: none;
            white-space: nowrap;

            color: #e8a800;

            text-shadow:
                0px 1px 0px #c98a00,
                0px 2px 0px #b87d00,
                0px 3px 0px #a87000,
                0px 4px 0px #986300,
                0px 5px 0px #885600,
                0px 6px 0px #784900,
                0px 7px 0px #683c00,
                0px 8px 10px rgba(0, 0, 0, 0.4),
                0px 10px 20px rgba(0, 0, 0, 0.25),
                /* top highlight */
                0px -1px 0px rgba(255, 230, 100, 0.6);
        }

        /* Search bar */
        .search-bar {
            display: flex;
            width: 100%;
            max-width: 840px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.18);
            margin-bottom: 1.6rem;
        }

        .search-input {
            flex: 1;
            padding: 1rem 1.5rem;
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--grey);
            background: var(--white);
            border: none;
            outline: none;
        }

        .search-input::placeholder {
            color: #bbb;
        }

        .search-btn {
            background: var(--yellow);
            border: none;
            padding: 0 1.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .search-btn:hover {
            background: var(--yellow-dark);
        }

        .search-btn svg {
            width: 24px;
            height: 24px;
            stroke: var(--black);
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
        }

        /* LEARN / TEACH / TRADE */
        .card-actions {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 840px;
        }

        .card-action-btn {
            flex: 1;
            min-width: 180px;
            max-width: 250px;
            padding: 0.9rem 1rem;
            background: rgba(255, 255, 255, 0.88);
            color: var(--black);
            font-family: var(--font-heading);
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border: none;
            border-radius: var(--radius-btn);
            cursor: pointer;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
            transition: all 0.22s;
            display: block;
        }

        .card-action-btn:hover {
            background: var(--white);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        }

        /* ========================
           FOOTER
        ======================== */
        .site-footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.8rem;
            color: var(--grey);
            background: var(--white);
            border-top: 1px solid #e0e0e0;
        }

        /* ========================
           RESPONSIVE
        ======================== */
        @media (max-width: 768px) {
            .navbar {
                padding: 0.8rem 1.2rem;
            }

            .nav-center {
                display: none;
            }

            .main-content {
                padding: 1.5rem 1rem;
            }

            .golden-card {
                min-height: 460px;
                padding: 2rem 1.2rem 2.5rem;
            }

            .card-actions {
                gap: 0.7rem;
            }

            .card-action-btn {
                min-width: 120px;
                font-size: 0.88rem;
            }
        }
    </style>
</head>

<body>

    <!-- ========================
         NAVBAR
    ======================== -->
    <nav class="navbar">
        <!-- Logo -->
        <a href="../index.html" class="navbar-logo">
            <div class="logo-box">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

                        stroke="#F2BD19" stroke-width="2" fill="none" stroke-linecap="round" />
                    <path
                        d="M5 12c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3zm14 0c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z"
                        fill="#F2BD19" />
                </svg>
            </div>
            <span class="logo-name">SkillSwap</span>
        </a>

        <!-- Center links -->
        <nav class="nav-center">
            <a href="home.html" class="active">Home </a>
            <a href="#">About </a>
            <a href="explore.html">Explore </a>
            <a href="dashboard.html">Dashboard </a>
            <a href="#">Blog </a>
            <a href="#">Contact </a>
        </nav>

        <!-- Right actions -->
        <div class="nav-right">
            <button class="nav-search-btn" aria-label="Search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />
                </svg>
            </button>

            <div class="nav-dropdown">
                <button class="nav-menu-btn" id="menuBtn" aria-label="Menu">&#9776;</button>
                <div class="dropdown-menu" id="dropdownMenu">
                    <a href="home.html">🏠 Home</a>
                    <a href="explore.html">🔍 Explore</a>
                    <a href="dashboard.html">📋 Dashboard</a>
                    <a href="profile.html">👤 Profile</a>
                    <a href="messages.html">💬 Messages</a>
                    <a href="../login.html" class="logout">⬅ Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- ========================
         MAIN
    ======================== -->
    <main class="main-content">
        <div class="golden-card">

            <!-- Grain overlay handled by ::before -->

            <!-- Doodle icons scattered -->
            <div class="doodles">
                <!-- Globe left -->
                <svg class="doodle" style="width:90px;height:90px;left:3%;top:8%;" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20" />
                </svg>
                <!-- Music note top-left -->
                <svg class="doodle" style="width:50px;height:50px;left:12%;top:5%;" viewBox="0 0 24 24">
                    <path d="M9 18V5l12-2v13" />
                    <circle cx="6" cy="18" r="3" />
                    <circle cx="18" cy="16" r="3" />
                </svg>
                <!-- Pencil left-mid -->
                <svg class="doodle" style="width:60px;height:60px;left:6%;top:55%;" viewBox="0 0 24 24">
                    <path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" />
                </svg>
                <!-- Star top-center-left -->
                <svg class="doodle" style="width:45px;height:45px;left:22%;top:6%;" viewBox="0 0 24 24">
                    <polygon
                        points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                </svg>
                <!-- Chat bubble left-bottom -->
                <svg class="doodle" style="width:65px;height:65px;left:2%;top:72%;" viewBox="0 0 24 24">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg>
                <!-- Rocket top-left-far -->
                <svg class="doodle" style="width:55px;height:55px;left:15%;top:75%;" viewBox="0 0 24 24">
                    <path
                        d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z" />
                    <path
                        d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z" />
                </svg>
                <!-- Globe right -->
                <svg class="doodle" style="width:100px;height:100px;right:3%;top:10%;" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20" />

                <!-- Heart right-top -->
                <svg class="doodle" style="width:48px;height:48px;right:16%;top:4%;" viewBox="0 0 24 24">

                </svg>

                <svg class="doodle" style="width:50px;height:50px;right:8%;top:45%;" viewBox="0 0 24 24">
                    <rect x="5" y="2" width="14" height="20" rx="2" />
                    <line x1="12" y1="18" x2="12.01" y2="18" />
                </svg>
                <!-- Soccer ball right-bottom -->
                <svg class="doodle" style="width:70px;height:70px;right:5%;bottom:8%;" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" />
                    <path
                        d="M12 2a10 10 0 0 1 6.32 2.26M12 2a10 10 0 0 0-6.32 2.26M2.68 7.74A10 10 0 0 0 2 12M21.32 7.74A10 10 0 0 1 22 12" />
                </svg>
                <!-- Palette bottom-left -->
                <svg class="doodle" style="width:55px;height:55px;left:8%;bottom:5%;" viewBox="0 0 24 24">

                    <circle cx="8.5" cy="7.5" r=".5" />

                </svg>
                <!-- Arrow right-bottom -->
                <svg class="doodle" style="width:45px;height:45px;right:20%;bottom:6%;" viewBox="0 0 24 24">
                    <line x1="5" y1="12" x2="19" y2="12" />
                    <polyline points="12 5 19 12 12 19" />
                </svg>
                <!-- Lock top-right-inner -->
                <svg class="doodle" style="width:42px;height:42px;right:28%;top:7%;" viewBox="0 0 24 24">
                    <rect x="3" y="11" width="18" height="11" rx="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                <!-- Tablet bottom-right-inner -->
                <svg class="doodle" style="width:52px;height:52px;right:14%;bottom:12%;" viewBox="0 0 24 24">
                    <rect x="4" y="2" width="16" height="20" rx="2" />
                    <line x1="12" y1="18" x2="12.01" y2="18" />

            </div>

            <!-- Main content -->
            <div class="card-content">

                <!-- Top button -->
                <a href="explore.html" class="card-top-btn">EXPLORE SKILLS</a>

                <!-- Subtitle -->
                <p class="card-subtitle">Trade skills, build community</p>

                <!-- Brand name embossed -->
                <h1 class="card-brand">SKILL-SWAP</h1>

                <!-- Search bar -->
                <div class="search-bar">
                    <input type="text" class="search-input" id="searchInput"
                        placeholder="Find a skill to learn or share" autocomplete="off">
                    <button class="search-btn" id="searchBtn" aria-label="Search">
                        <svg viewBox="0 0 24 24">
                            <circle cx="11" cy="11" r="8" />
                            <path d="m21 21-4.35-4.35" />
                        </svg>
                    </button>
                </div>

                <!-- Action buttons -->
                <div class="card-actions">
                    <a href="explore.html" class="card-action-btn">LEARN</a>
                    <a href="profile.html" class="card-action-btn">TEACH</a>
                    <a href="explore.html" class="card-action-btn">TRADE</a>

            </div>
        </div>
    </main>

    <!-- ========================
         FOOTER
    ======================== -->
    <footer class="site-footer">
        © 2025 SkillSwap. Exchange skills, not money.
    </footer>

    <!-- ========================
         JAVASCRIPT
    ======================== -->
    <script>
        // Dropdown menu toggle
        const menuBtn = document.getElementById('menuBtn');
        const dropdownMenu = document.getElementById('dropdownMenu');

        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdownMenu.classList.toggle('open');
        });

        document.addEventListener('click', () => {
            dropdownMenu.classList.remove('open');
        });

        // Search redirect
        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchInput');

        function doSearch() {
            const q = searchInput.value.trim();
            if (q) {
                window.location.href = `explore.html?q=${encodeURIComponent(q)}`;
            } else {
                window.location.href = 'explore.html';
            }
        }

        searchBtn.addEventListener('click', doSearch);
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doSearch();
        });
    </script>

</body>

</html>
