<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home — SkillSwap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Caveat:wght@500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --flame: #f97316;
      --flame-lt: #fb923c;
      --ink: #fff8f0;
      --ink2: #e8d5c0;
      --ink3: #b89880;
      --ink4: #8a7060;
      --bg: #0f0705;
      --bg2: #1a0e08;
      --bg3: #251510;
      --bg4: #2e1a12;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.1);
      --r-btn: 100px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'Instrument Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    a { text-decoration: none; color: inherit; }

    .navbar {
      height: 66px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-wrap { display: flex; align-items: center; gap: 10px; }

    .logo-icon {
      width: 36px; height: 36px;
      background: var(--flame);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-icon svg { width: 22px; height: 22px; }

    .logo-name {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--ink);
    }

    .nav-center { display: flex; align-items: center; gap: 2px; }

    .nav-center a {
      font-size: 0.85rem; font-weight: 500; color: var(--ink3);
      padding: 6px 14px; border-radius: var(--r-btn);
      transition: all 0.2s; border: 1px solid transparent;
    }

    .nav-center a:hover {
      color: var(--flame-lt); border: 1px solid var(--flame);
      box-shadow: 0 0 10px rgba(249,115,22,0.25);
    }

    .nav-center a.active { background: var(--flame); color: #1a0a00; font-weight: 700; }

    .nav-right { display: flex; align-items: center; gap: 10px; }

    .nav-search-btn {
      background: none; border: none; cursor: pointer; color: var(--ink3);
      display: flex; align-items: center; padding: 6px; transition: color 0.2s;
    }

    .nav-search-btn:hover { color: var(--ink); }
    .nav-search-btn svg { width: 18px; height: 18px; }

    .nav-dropdown { position: relative; }

    .nav-menu-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--bg3); border: 1px solid var(--border2);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--ink2); font-size: 1rem; transition: all 0.2s;
    }

    .nav-menu-btn:hover { background: var(--bg4); }

    .dropdown-menu {
      display: none; position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 14px; box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      min-width: 180px; overflow: hidden; z-index: 200;
    }

    .dropdown-menu.open { display: block; animation: ddIn 0.18s ease; }

    @keyframes ddIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .dropdown-menu a {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px; font-size: 0.875rem; font-weight: 500;
      color: var(--ink2); transition: background 0.15s;
    }

    .dropdown-menu a:hover { background: var(--bg3); color: var(--ink); }

    .dropdown-menu .logout { color: #f87171; border-top: 1px solid var(--border); }
    .dropdown-menu .logout:hover { background: rgba(248,113,113,0.08); }

    .main-content { flex: 1; display: flex; align-items: stretch; }

    .hero-card {
      position: relative; width: 100%; background: var(--flame);
      overflow: hidden; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem 2rem 3.5rem; min-height: calc(100vh - 66px);
    }

    .hero-card::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 15% 50%, rgba(0,0,0,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(255,255,255,0.08) 0%, transparent 45%),
        radial-gradient(ellipse at 60% 85%, rgba(0,0,0,0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .doodles { position: absolute; inset: 0; z-index: 2; pointer-events: none; }

    .doodle {
      position: absolute; opacity: 0.15; stroke: #5a2200; fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    }

    .card-content {
      position: relative; z-index: 10; width: 100%; max-width: 900px;
      display: flex; flex-direction: column; align-items: center;
      animation: cardIn 0.7s ease forwards;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-subtitle {
      font-family: var(--font-body);
      font-size: clamp(0.9rem, 1.8vw, 1.2rem);
      font-weight: 500; color: rgba(26,10,0,0.65);
      letter-spacing: 0.01em; margin-bottom: 0.2rem; text-align: center;
    }

    .card-brand {
      font-family: var(--font-head);
      font-size: clamp(3.2rem, 9vw, 8.5rem);
      font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase;
      text-align: center; line-height: 1; margin-bottom: 2rem;
      user-select: none; white-space: nowrap; color: #d96500;
      text-shadow:
        0px 1px 0px #c05500, 0px 2px 0px #ad4c00, 0px 3px 0px #9a4300,
        0px 4px 0px #873a00, 0px 5px 0px #743100, 0px 6px 0px #612800,
        0px 7px 0px #4e1f00, 0px 8px 10px rgba(0,0,0,0.4),
        0px 10px 20px rgba(0,0,0,0.25), 0px -1px 0px rgba(255,200,80,0.5);
    }

    .search-bar {
      display: flex; width: 100%; max-width: 860px;
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25); margin-bottom: 1.8rem;
    }

    .search-input {
      flex: 1; padding: 1rem 1.4rem;
      font-family: var(--font-body); font-size: 0.95rem;
      color: var(--ink); background: var(--bg2); border: none; outline: none;
    }

    .search-input::placeholder { color: var(--ink3); }

    .search-btn {
      background: var(--bg); border: none; padding: 0 1.5rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; flex-shrink: 0;
    }

    .search-btn:hover { background: var(--bg3); }

    .search-btn svg {
      width: 22px; height: 22px; stroke: var(--flame-lt);
      fill: none; stroke-width: 2.5; stroke-linecap: round;
    }

    /* Two buttons — equal width, centered, max-width capped for balance */
    .card-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      width: 100%;
      max-width: 480px;
    }

    .card-action-btn {
      flex: 1;
      padding: 0.95rem 1.2rem;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(12px);
      color: var(--ink);
      border: 1px solid rgba(255,255,255,0.2);
      font-family: var(--font-head);
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: var(--r-btn);
      cursor: pointer;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      transition: all 0.22s;
      display: block;
    }

    .card-action-btn:hover {
      background: rgba(0,0,0,0.4);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.3);
      border-color: rgba(255,255,255,0.35);
    }

    .site-footer {
      text-align: center; padding: 1.2rem;
      font-size: 0.78rem; color: var(--ink4);
      border-top: 1px solid var(--border); background: var(--bg2);
    }

    @media (max-width: 768px) {
      .navbar { padding: 0 1.2rem; }
      .nav-center { display: none; }
      .hero-card { padding: 2rem 1.2rem 2.5rem; }
      .card-actions { max-width: 320px; }
      .card-action-btn { font-size: 0.85rem; }
      .card-brand { white-space: normal; word-break: break-word; }
    }
  </style>
</head>

  <script>
    const menuBtn = document.getElementById('menuBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');
    menuBtn.addEventListener('click', e => { e.stopPropagation(); dropdownMenu.classList.toggle('open'); });
    document.addEventListener('click', () => dropdownMenu.classList.remove('open'));

    const searchBtn = document.getElementById('searchBtn');
    const searchInput = document.getElementById('searchInput');
    function doSearch() {
      const q = searchInput.value.trim();
      window.location.href = q ? `learn.html?q=${encodeURIComponent(q)}` : 'learn.html';
    }
    searchBtn.addEventListener('click', doSearch);
    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
  </script>
